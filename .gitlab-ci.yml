image: node:20

stages:
  - build_and_test
  - deploy

cache:
  key: ${CI_COMMIT_REF_SLUG}
  paths:
    - extension/node_modules/
    - docs/node_modules/

build_extension:
  stage: build_and_test
  script:
    - node -v
    - npm -v
    - cp LICENSE extension/LICENSE.txt
    - cd extension
    - npm install --progress=false
    - npm run compile
    - npm run lint
    - npm run package
  artifacts:
    name: "kuka-krl-extension-$CI_COMMIT_SHORT_SHA"
    paths:
      - extension/*.vsix
    expire_in: 1 week
  only:
    - main

pages:
  stage: deploy
  script:
    - cd docs
    - npm install --progress=false
    - npx vitepress build
  artifacts:
    paths:
      - public
  only:
    - main
